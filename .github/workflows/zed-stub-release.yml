# Builds the memento-stub native binary for all supported platforms and
# uploads the artefacts to the existing GitHub Release for the Python package.
#
# Trigger: push of a tag matching "v[0-9]*"  (e.g. "v0.2.8")
#
# The workflow compiles the stub for all 5 supported targets and then uploads
# the resulting binaries as assets to the GitHub Release that was created by
# the Python release process (same tag).
#
# Assets published:
#   memento-stub-x86_64-pc-windows-msvc.exe
#   memento-stub-x86_64-apple-darwin
#   memento-stub-aarch64-apple-darwin
#   memento-stub-x86_64-unknown-linux-gnu
#   memento-stub-aarch64-unknown-linux-gnu

name: Zed Stub Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write # needed to upload assets to an existing release

# ---------------------------------------------------------------------------
# Matrix build — one job per target platform
# ---------------------------------------------------------------------------
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: memento-stub-x86_64-pc-windows-msvc.exe
            exe_suffix: .exe
            use_cross: false

          # ── macOS Intel ────────────────────────────────────────────────────
          # macos-13 (Intel) was removed — cross-compile from Apple Silicon runner.
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: memento-stub-x86_64-apple-darwin
            exe_suffix: ""
            use_cross: false

          # ── macOS Apple Silicon ────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: memento-stub-aarch64-apple-darwin
            exe_suffix: ""
            use_cross: false

          # ── Linux x86_64 ───────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: memento-stub-x86_64-unknown-linux-gnu
            exe_suffix: ""
            use_cross: false

          # ── Linux ARM64 ────────────────────────────────────────────────────
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: memento-stub-aarch64-unknown-linux-gnu
            exe_suffix: ""
            use_cross: true # cross-compiled via the `cross` tool

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── cross (Linux ARM64 only) ──────────────────────────────────────────
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (cargo)
        if: "!matrix.use_cross"
        working-directory: integrations/zed/stub
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        working-directory: integrations/zed/stub
        run: cross build --release --target ${{ matrix.target }}

      # ── Locate the compiled binary ────────────────────────────────────────
      # The workspace root-level target/ is used because the Cargo workspace
      # is defined at integrations/zed/, so the output lands one level up from
      # the stub crate.
      - name: Rename binary to asset name
        shell: bash
        run: |
          SRC="integrations/zed/target/${{ matrix.target }}/release/memento-stub${{ matrix.exe_suffix }}"
          cp "$SRC" "${{ matrix.asset }}"
          echo "Built: $(ls -lh ${{ matrix.asset }})"

      # ── Upload artefact (shared between build and release jobs) ───────────
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Upload job — attaches binaries to the existing Python release
  # ---------------------------------------------------------------------------
  upload:
    name: Upload stub binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (needed for gh cli context) ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download all artefacts ────────────────────────────────────────────
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artefacts
        run: ls -lh dist/

      # ── Upload assets to the existing release ────────────────────────────
      # The Python release (same tag) must already exist before this runs.
      # deploy.py creates it via `git tag vX.Y.Z && git push origin vX.Y.Z`
      # followed by the GitHub release created in the bump workflow.
      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Uploading stub binaries to release ${TAG}"
          gh release upload "${TAG}" \
            dist/memento-stub-x86_64-pc-windows-msvc.exe \
            dist/memento-stub-x86_64-apple-darwin \
            dist/memento-stub-aarch64-apple-darwin \
            dist/memento-stub-x86_64-unknown-linux-gnu \
            dist/memento-stub-aarch64-unknown-linux-gnu \
            --clobber
          echo "Done."
