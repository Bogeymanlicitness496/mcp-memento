# MemoryGraph Configuration File
# This file configures the MemoryGraph MCP server for Zed editor
# Hierarchy: Defaults → ~/.memorygraph/config.yaml → ./memorygraph.yaml → Environment Variables

# Backend configuration
backend: "sqlite"  # Only sqlite is supported
sqlite_path: "~/.memorygraph/memory.db"  # Path to SQLite database file

# Tool configuration
tool_profile: "extended"  # Options: core, extended, advanced
enable_advanced_tools: true  # Enable advanced relationship analysis tools

# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Feature configuration
features:
  auto_extract_entities: true  # Automatically extract entities from memory content
  session_briefing: true  # Enable session briefing feature
  briefing_verbosity: "standard"  # Options: minimal, standard, detailed
  briefing_recency_days: 7  # Number of days to consider for briefing
  allow_relationship_cycles: false  # Allow cycles in relationship graph

# Example of environment variable overrides:
# MEMORY_BACKEND=sqlite
# MEMORY_SQLITE_PATH=/custom/path/memory.db
# MEMORY_TOOL_PROFILE=advanced
# MEMORY_ENABLE_ADVANCED_TOOLS=true
# MEMORY_LOG_LEVEL=DEBUG
# MEMORY_AUTO_EXTRACT_ENTITIES=false
# MEMORY_SESSION_BRIEFING=false
# MEMORY_BRIEFING_VERBOSITY=detailed
# MEMORY_BRIEFING_RECENCY_DAYS=14
# MEMORY_ALLOW_CYCLES=true

# Note: Environment variables take precedence over YAML configuration
